<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- Styles -->
        <link rel="stylesheet" href="CSS/main.css">
        <link rel="stylesheet" href="CSS/clock.css">
        <link rel="stylesheet" href="CSS/search.css">
        <link rel="stylesheet" href="CSS/shortcuts.css">
        <link rel="stylesheet" href="CSS/footer.css">
        <link rel="stylesheet" href="CSS/settingsbtn.css">
</head>

<body>
<main>

  <!-- Oben: Uhr & Wetter -->
  <div class="top-group">
    <section class="clock-widget">
      <div id="clock"></div>
      <div id="date"></div>
      <div id="greeting"></div>
    </section>

    <div id="weather">
      <div id="location">Loading...</div>
      <div id="temperature">--°C</div>
      <div id="feels-like">Feels: --°C</div>
    </div>
  </div>

  <!-- Unten: Suche & Shortcuts -->
  <div class="bottom-group">
    <form action="https://www.google.com/search" method="get">
      <input type="text" name="q" id="search" placeholder="Search Google..." autocomplete="off">
    </form>

    <div class="shortcuts" id="shortcuts-container"></div>
  </div>

  <button id="settings-btn">Settings</button>

</main>

    <footer>
        <span>Origin - minimal new tab v1.1</span>
    </footer>

    <script src="/tabs/script.js"></script>
</body>
</html>
